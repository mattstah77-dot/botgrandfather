services:
  - type: database
    name: botgrandfather-db
    databaseName: telegram-bot-platform
    user: botgrandfather
    plan: starter
    ipAllowList: []

  - type: web
    name: botgrandfather-api
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: botgrandfather-db
          property: connectionString
      - key: TELEGRAM_BOT_API_URL
        value: https://api.telegram.org
      - key: WEBHOOK_HOST
        sync: false
        description: "Your Render web service URL (https://your-service.onrender.com)"
      - key: WEBHOOK_PATH
        value: /webhook
